<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Google Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">
        <div class="header">
            AO Tracking
        </div>

        <div class="content">
            <!--HeroSection-->
            <div class="welcome">
                <h2 id="username">Detail Tugas</h2>
                <h3 style="color: grey;">Muhammad Jokowi</h3>
            </div>
            <!-- Modal Loading -->
            <div class="modal fade" id="loadingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-lg rounded-4">
                        <div class="modal-body text-center py-5">
                            <div class="d-flex justify-content-center mb-4">
                                <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
                                </div>
                            </div>
                            <h5 class="fw-semibold">Mengambil Lokasi...</h5>
                            <p class="text-muted small mb-0">
                                Sistem sedang menentukan titik koordinat terbaik
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- MAP -->
            <div class="shadow-lg" id="map"></div>
            <!--Buat catatan-->
            <div class="mb-3">
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="5"
                    placeholder="Buat Catatan..."></textarea>
            </div>
            <!--CTA Kirim laporan-->
            <div class="d-grid gap-2 mx-auto">
                <button class="btn btn-primary" type="button">Selesaikan Tugas</button>
                <a href="task.html" class="btn btn-outline-primary" type="button">Lihat Tugas</a>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Google Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">
        <div class="header">
            AO Tracking
        </div>

        <div class="content">
            <!--HeroSection-->
            <div class="welcome">
                <h2 id="username">History Penagihan</h2>
            </div>

            <!--CTA Breadcrumb-->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">History</li>
                </ol>
            </nav>

            <!--Fitur Filter and Search-->
            <form class="d-flex" role="search">
                <!-- Example single danger button -->
                <div class="btn-group">
                    <button type="button" class="btn btn-primary me-3 dropdown-toggle" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Pilih tanggal
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">1 Hari yang lalu</a></li>
                        <li><a class="dropdown-item" href="#">1 Minggu yang lalu</a></li>
                        <li><a class="dropdown-item" href="#">1 Bulan yang lalu</a></li>
                    </ul>
                </div>
                <button class="btn btn-outline-success" type="submit">Cari</button>
            </form>

            <!--Data Dummy-->
            <div class="mt-3">
                <div class="card shadow-sm border-0 rounded-3" >
                    <div class="card-body py-3 px-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <!-- Nama -->
                            <div>
                                <h6 class="mb-1 fw-bold">Muhammad Jokowi</h6>
                                <small class="text-muted">
                                    Terakhir dikunjungi 1 hari yang lalu
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>

</body>

</html>
